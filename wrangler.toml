name = "qiaomu-blog-opensource"
main = "worker.ts"
compatibility_date = "2026-04-14"
compatibility_flags = ["nodejs_compat", "global_fetch_strictly_public"]

[dev]
port = 8788

[assets]
directory = ".open-next/assets"
binding = "ASSETS"

[ai]
binding = "WORKERS_AI"

[[d1_databases]]
binding = "DB"
database_name = "qiaomu-blog-opensource"
database_id = "13df76f6-15fc-447e-b1ea-3f6be09444c4"

[[r2_buckets]]
binding = "IMAGES"
bucket_name = "qiaomu-blog-opensource"

[vars]
NEXT_PUBLIC_SITE_URL = "https://your-domain.com"
AI_BASE_URL = "https://api.openai.com/v1"
AI_MODEL = "gpt-4o-mini"
WORKERS_AI_MODEL = "@cf/meta/llama-3.1-8b-instruct"

